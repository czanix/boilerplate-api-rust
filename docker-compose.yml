services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: czanix
      POSTGRES_USER: czanix
      POSTGRES_PASSWORD: czanix_dev
    ports:
      - "5432:5432"

  # ----------------------------------------------------
  # Jaeger — Distributed Tracing (OpenTelemetry)
  # Acesse a UI em: http://localhost:16686
  # ----------------------------------------------------
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: czanix_jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      - COLLECTOR_OTLP_ENABLED=true
